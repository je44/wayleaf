<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>tab-tab</title>
    <link rel="stylesheet" href="newtab.css">
  </head>
  <body>
    <header class="topbar" aria-label="顶部功能区">
      <div class="surface-launchers" aria-label="二级页面入口">
        <button class="icon-button surface-toggle" id="portalSurfaceButton" type="button" aria-controls="portalPanel" aria-expanded="false" title="导航中枢" aria-label="导航中枢">
          <span class="button-icon" aria-hidden="true"></span>
        </button>
      </div>
      <div class="topbar-actions">
        <button class="icon-button theme-toggle settings-toggle" id="settingsButton" type="button" aria-haspopup="dialog" aria-controls="settingsPanel" aria-expanded="false" title="设置中心">
          <span class="theme-toggle-icon" aria-hidden="true"></span>
        </button>
      </div>
    </header>

    <main class="home-stage" aria-label="tab-tab 搜索工作台">
      <section class="search-workbench" aria-label="搜索和常用网站">
        <div class="search-panel">
          <form class="topbar-search" id="quickSearchForm" role="search">
            <label class="visually-hidden" for="quickSearchInput">搜索或输入网址</label>
            <span class="visually-hidden" id="quickSearchEngineLabel">搜索引擎</span>
            <span class="search-engine-control">
              <span class="search-engine-search-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" focusable="false">
                  <circle cx="10.75" cy="10.75" r="5.25"></circle>
                  <path d="m14.75 14.75 4.5 4.5"></path>
                </svg>
              </span>
              <div class="ai-engine-pill" id="aiEnginePill" hidden aria-hidden="true"></div>
            </span>
            <div class="quick-search-entry">
              <input id="quickSearchInput" name="q" type="search" autocomplete="off" spellcheck="false" placeholder="搜索或输入网址">
            </div>
            <span class="quick-search-settings" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M12 3 19.5 7.25v8.5L12 20 4.5 15.75v-8.5L12 3Z"></path>
                <path d="M12 8.5 15.1 10.25v3.5L12 15.5l-3.1-1.75v-3.5L12 8.5Z"></path>
              </svg>
            </span>
          </form>
          <div class="search-suggestions" id="searchSuggestions" role="listbox" aria-label="搜索建议" hidden></div>
        </div>
        <button class="favorite-add-button" id="favoriteAddButton" type="button" aria-haspopup="dialog" aria-controls="favoriteForm" aria-expanded="false" aria-hidden="true" data-state="hidden" data-hydrating="true" tabindex="-1" disabled hidden>
          <span class="button-icon" aria-hidden="true"></span>
        </button>
        <form class="favorite-form" id="favoriteForm" hidden>
          <label>
            <span>网址</span>
            <input id="favoriteUrlInput" name="url" autocomplete="off" inputmode="url" placeholder="https://www.notion.so">
          </label>
          <div class="form-actions">
            <button class="text-button" type="button" id="cancelFavoriteButton">取消</button>
            <button class="text-button primary" type="submit">添加</button>
          </div>
          <p class="form-error" id="favoriteFormError" role="alert"></p>
        </form>
        <div class="favorite-strip" id="favoriteStrip" aria-label="自定义常用网站" data-hydrating="true"></div>
      </section>
      <section class="recent-folders" aria-labelledby="recent-folders-title">
        <div class="recent-folders-header">
          <h2 id="recent-folders-title">最近浏览</h2>
        </div>
        <div class="recent-folder-grid" id="recentHistoryFolders" aria-live="polite"></div>
      </section>
    </main>

    <nav class="mobile-section-switcher" aria-label="切换信息分区">
      <button class="mobile-section-tab active" type="button" data-panel-target="portalPanel" aria-controls="portalPanel" aria-selected="true">入口</button>
    </nav>

    <aside class="shell" id="secondaryShell" aria-label="tab-tab 控制台" data-active-surface="">
      <section class="panel portal-panel" id="portalPanel" aria-labelledby="portal-title">
        <button class="icon-button surface-back-button" type="button" title="返回" aria-label="返回">
          <span class="button-icon" aria-hidden="true"></span>
        </button>
        <header class="panel-header">
          <div>
            <h1 id="portal-title">导航中枢</h1>
          </div>
          <button class="icon-button subtle-action" id="togglePortalFormButton" type="button" title="添加入口" aria-label="添加入口">
            <span class="button-icon" aria-hidden="true"></span>
          </button>
        </header>

        <div class="portal-mode-tabs" role="tablist" aria-label="导航中枢" data-active-view="smart">
          <button class="portal-mode-tab active" id="smartPortalTab" type="button" role="tab" aria-selected="true" aria-controls="smartPortalView" data-portal-view="smart">智能常用</button>
          <button class="portal-mode-tab" id="bookmarkPortalTab" type="button" role="tab" aria-selected="false" aria-controls="bookmarkPortalView" data-portal-view="bookmarks">自选书签</button>
        </div>

        <div class="portal-workspace">
          <div class="portal-view active" id="smartPortalView" role="tabpanel" aria-labelledby="smartPortalTab">
          <form class="portal-form" id="portalForm" hidden>
            <label>
              <span>名称</span>
              <input id="portalTitleInput" name="title" autocomplete="off" placeholder="例如：Notion">
            </label>
            <label>
              <span>网址</span>
              <input id="portalUrlInput" name="url" autocomplete="off" inputmode="url" placeholder="https://www.notion.so">
            </label>
            <label>
              <span>归类</span>
              <select id="portalCategorySelect" name="category"></select>
            </label>
            <div class="form-actions">
              <button class="text-button" type="button" id="cancelPortalButton">取消</button>
              <button class="text-button primary" type="submit">添加</button>
            </div>
            <p class="form-error" id="portalFormError" role="alert"></p>
          </form>

          <div class="portal-grid" id="portalGrid"></div>
          </div>

          <div class="portal-view" id="bookmarkPortalView" role="tabpanel" aria-labelledby="bookmarkPortalTab" hidden>
          <div class="bookmark-toolbar">
            <div class="bookmark-folder-meta" id="bookmarkFolderMeta"></div>
            <div class="header-actions">
              <button class="icon-button subtle-action" id="refreshBookmarkFolderButton" type="button" title="刷新当前书签文件夹" aria-label="刷新当前书签文件夹">
                <span class="button-icon" aria-hidden="true"></span>
              </button>
              <button class="icon-button subtle-action" id="toggleBookmarkLayoutButton" type="button" title="切换为列表显示" aria-label="切换为列表显示" aria-pressed="false">
                <span class="button-icon" aria-hidden="true"></span>
              </button>
              <button class="icon-button subtle-action" id="chooseBookmarkFolderButton" type="button" title="选择书签文件夹" aria-label="选择书签文件夹">
                <span class="button-icon" aria-hidden="true"></span>
              </button>
            </div>
          </div>
          <div class="bookmark-toolbar bookmark-picker-toolbar" id="bookmarkPickerToolbar" hidden>
            <div class="header-actions">
              <button class="icon-button subtle-action" id="closeBookmarkPickerButton" type="button" title="返回" aria-label="返回">
                <span class="button-icon" aria-hidden="true"></span>
              </button>
            </div>
          </div>

          <div class="bookmark-view" id="bookmarkMainView">
            <div class="portal-grid bookmark-grid" id="bookmarkGrid"></div>
          </div>

          <div class="bookmark-picker" id="bookmarkPicker" hidden>
            <div class="visually-hidden" id="bookmarkPickerTitle">选择一个书签文件夹</div>
            <div class="bookmark-folder-list" id="bookmarkFolderList"></div>
          </div>
          </div>
        </div>
      </section>

      <section class="panel history-panel" id="historyPanel" aria-labelledby="history-title">
        <button class="icon-button surface-back-button" type="button" title="返回" aria-label="返回">
          <span class="button-icon" aria-hidden="true"></span>
        </button>
        <header class="panel-header history-header">
          <div>
            <h2 id="history-title">最近浏览</h2>
          </div>
          <button class="icon-button" id="refreshHistoryButton" type="button" title="刷新历史记录" aria-label="刷新历史记录">
            <span class="button-icon" aria-hidden="true"></span>
          </button>
        </header>
        <div class="history-stack" aria-live="polite">
          <section class="history-group pinned-group" aria-labelledby="pinned-title">
            <h3 class="section-title" id="pinned-title">置顶</h3>
            <div class="history-grid pinned-grid" id="pinnedGrid"></div>
          </section>
          <section class="history-group recent-group" aria-labelledby="recent-title">
            <h3 class="section-title" id="recent-title">最近</h3>
            <div class="history-grid" id="historyGrid"></div>
          </section>
        </div>
      </section>
    </aside>

    <section class="settings-panel" id="settingsPanel" role="dialog" aria-modal="false" aria-labelledby="settingsTitle" hidden>
      <header class="settings-header">
        <div>
          <h2 id="settingsTitle">设置中心</h2>
        </div>
        <button class="icon-button subtle-action" id="closeSettingsButton" type="button" title="关闭设置中心" aria-label="关闭设置中心">
          <span class="button-icon" aria-hidden="true"></span>
        </button>
      </header>

      <div class="settings-body">
        <section class="settings-group" aria-labelledby="appearanceModeTitle">
          <div class="settings-group-heading">
            <h3 id="appearanceModeTitle">外观模式</h3>
          </div>
          <div class="segmented-control theme-mode-control" role="group" aria-label="外观模式" data-active-index="0">
            <button class="segmented-option" type="button" data-theme-mode="system">跟随</button>
            <button class="segmented-option" type="button" data-theme-mode="light">日间</button>
            <button class="segmented-option" type="button" data-theme-mode="dark">夜间</button>
          </div>
        </section>

        <section class="settings-group" aria-labelledby="presetPaletteTitle">
          <div class="settings-group-heading">
            <h3 id="presetPaletteTitle">默认双色</h3>
          </div>
          <div class="palette-preset-grid" id="palettePresetGrid" role="radiogroup" aria-labelledby="presetPaletteTitle"></div>
        </section>

        <section class="settings-group" aria-labelledby="syncSettingsTitle">
          <div class="settings-group-heading">
            <h3 id="syncSettingsTitle">云端同步</h3>
          </div>
          <div class="sync-settings-row" id="syncSettingsRow" data-status="ready">
            <span class="sync-settings-icon" aria-hidden="true"></span>
            <span class="sync-settings-copy">
              <strong id="syncSettingsStatus">配置会跟随 Chrome 账号同步</strong>
              <span id="syncSettingsDetail">同一 Google 账号安装后会自动恢复。</span>
            </span>
            <button class="icon-button subtle-action sync-settings-action" id="syncSettingsNowButton" type="button" title="手动同步" aria-label="手动同步">
              <span class="button-icon" aria-hidden="true"></span>
            </button>
          </div>
        </section>

        <section class="settings-group" aria-labelledby="customPaletteTitle">
          <div class="settings-group-heading">
            <h3 id="customPaletteTitle">自定义双色</h3>
          </div>
          <div class="color-picker-grid">
            <label class="color-picker-row">
              <span>日间</span>
              <input id="lightAccentInput" type="color" value="#0d6d59">
              <output id="lightAccentValue">#0d6d59</output>
            </label>
            <label class="color-picker-row">
              <span>夜间</span>
              <input id="darkAccentInput" type="color" value="#68c19e">
              <output id="darkAccentValue">#68c19e</output>
            </label>
          </div>
        </section>
      </div>
    </section>

    <template id="siteCardTemplate">
      <div class="site-card">
        <a class="site-link">
          <img class="site-icon" alt="">
          <span class="site-copy">
            <strong class="site-title"></strong>
            <span class="site-domain"></span>
          </span>
        </a>
        <button class="site-remove" type="button" title="删除自定义入口" aria-label="删除自定义入口"></button>
      </div>
    </template>

    <template id="favoriteSiteTemplate">
      <div class="favorite-site">
        <a class="favorite-link">
          <span class="favorite-icon-shell">
            <img class="favorite-icon" alt="">
          </span>
        </a>
        <button class="favorite-remove" type="button" title="删除自定义网站" aria-label="删除自定义网站"></button>
      </div>
    </template>

    <script src="newtab.js"></script>
  </body>
</html>

    <text x="0" y="80" fill="#202725" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="76" font-weight="750" letter-spacing="-3">Wayleaf</text>
    <text x="0" y="130" fill="#35413a" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="26" font-weight="650">搜索、书签与常用网站，回到一个页面。</text>
    <text x="0" y="170" fill="#5e6965" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" font-size="19">无需账号 · 本地优先 · 明暗主题 · 多语言</text>

    <g transform="translate(0 226)">

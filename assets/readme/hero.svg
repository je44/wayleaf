<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400" role="img" aria-labelledby="title desc">
  <title id="title">Wayleaf — 安静、实用的 Chrome 新标签页</title>
  <desc id="desc">Wayleaf 标题与项目界面示意：搜索框、常用网站和最近访问卡片。</desc>

  <rect width="1200" height="400" rx="28" fill="#eceee9"/>
